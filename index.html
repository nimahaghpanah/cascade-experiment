<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Information Cascade Experiment</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 28px 16px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 36px 32px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .eyebrow {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #9ca3af;
      font-weight: 600;
      margin-bottom: 5px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #111827;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #6b7280;
      line-height: 1.55;
      margin-bottom: 28px;
    }

    .field-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #6b7280;
      margin-bottom: 7px;
    }

    select, input[type="number"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e5e7eb;
      border-radius: 9px;
      font-size: 1rem;
      color: #111827;
      background: white;
      margin-bottom: 20px;
    }
    select { appearance: none; -webkit-appearance: none; cursor: pointer; }
    select:focus, input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 9px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 2px;
    }
    .btn-primary:hover:not(:disabled) { background: #1d4ed8; }
    .btn-primary:disabled { background: #93c5fd; cursor: default; }

    .error-msg {
      color: #dc2626;
      font-size: 0.85rem;
      margin-top: -12px;
      margin-bottom: 14px;
    }

    /* ââ Instructor screen âââââââââââââââââââââââââââââ */
    .timeline-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
      margin-top: 6px;
    }
    .timeline-table th {
      text-align: left;
      color: #9ca3af;
      font-weight: 600;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 4px 0 8px;
    }
    .timeline-table th:last-child { text-align: right; }
    .timeline-table td {
      padding: 5px 0;
      color: #374151;
      border-top: 1px solid #f3f4f6;
    }
    .timeline-table td:last-child { text-align: right; color: #6b7280; }
    .timeline-table tr.fired td { color: #9ca3af; text-decoration: line-through; }

    .exp-running-msg {
      background: #f0fdf4;
      border: 1.5px solid #86efac;
      border-radius: 9px;
      padding: 12px 16px;
      font-size: 0.88rem;
      color: #166534;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    /* ââ Waiting screen ââââââââââââââââââââââââââââââââ */
    .wait-title { font-size: 1.05rem; font-weight: 600; color: #111827; margin-bottom: 5px; }

    .spinner-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .spinner {
      width: 20px; height: 20px;
      border: 2.5px solid #e5e7eb;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .wait-msg { font-size: 0.92rem; color: #374151; line-height: 1.55; margin-bottom: 26px; }

    .section-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9ca3af;
      margin-bottom: 10px;
    }

    .progress-dots { display: flex; flex-wrap: wrap; gap: 8px; }
    .dot {
      width: 38px; height: 38px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem; font-weight: 700;
    }
    .dot-pending { background: #f3f4f6; color: #9ca3af; }
    .dot-done    { background: #d1fae5; color: #065f46; }
    .dot-auto    { background: #d1fae5; color: #065f46; }
    .dot-me      { background: #dbeafe; color: #1d4ed8; outline: 2px solid #3b82f6; }

    /* ââ Decision screen âââââââââââââââââââââââââââââââ */
    .dec-title { font-size: 1.05rem; font-weight: 600; color: #111827; margin-bottom: 20px; }

    .prior-box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 6px;
    }
    .decision-row {
      display: flex; justify-content: space-between;
      padding: 5px 0; font-size: 0.93rem; color: #374151;
      border-bottom: 1px solid #f3f4f6;
    }
    .decision-row:last-child { border-bottom: none; }
    .decision-row .pl  { color: #6b7280; }
    .decision-row .urn { font-weight: 700; color: #111827; }

    .note-text { font-size: 0.88rem; color: #6b7280; font-style: italic; margin-bottom: 6px; }
    .prior-section { margin-bottom: 24px; }

    /* Signal display */
    .signal-section { margin-bottom: 24px; }
    .signal-display {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px;
      border-radius: 10px;
      border: 2px solid #e5e7eb;
      background: #f9fafb;
    }
    .signal-ball { width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0; }
    .signal-text { font-size: 1.05rem; font-weight: 600; color: #111827; }
    .signal-missing { font-size: 0.88rem; color: #dc2626; font-style: italic; }

    /* Countdown */
    .countdown-wrap {
      display: flex; align-items: center; gap: 14px;
      background: #fffbeb; border: 1.5px solid #fbbf24;
      border-radius: 10px; padding: 12px 16px; margin-bottom: 24px;
      transition: background 0.4s, border-color 0.4s;
    }
    .countdown-wrap.urgent { background: #fef2f2; border-color: #ef4444; }

    .countdown-num {
      font-size: 1.7rem; font-weight: 700; color: #92400e;
      min-width: 36px; text-align: center; line-height: 1;
    }
    .countdown-wrap.urgent .countdown-num { color: #991b1b; }

    .countdown-right { flex: 1; }
    .countdown-label { font-size: 0.78rem; color: #92400e; font-weight: 500; margin-bottom: 5px; }
    .countdown-wrap.urgent .countdown-label { color: #991b1b; }

    .countdown-track { height: 5px; background: #fde68a; border-radius: 3px; overflow: hidden; }
    .countdown-wrap.urgent .countdown-track { background: #fecaca; }
    .countdown-fill { height: 100%; background: #f59e0b; border-radius: 3px; transition: width 1s linear; }
    .countdown-wrap.urgent .countdown-fill { background: #ef4444; }

    /* Urn buttons */
    .urn-hint { font-size: 0.82rem; color: #9ca3af; margin-bottom: 12px; }
    .urn-buttons { display: flex; gap: 12px; }
    .btn-urn {
      flex: 1; padding: 17px 10px;
      background: white; border: 2px solid #e5e7eb;
      border-radius: 10px; font-size: 1.05rem; font-weight: 700;
      cursor: pointer; color: #111827;
      transition: border-color 0.12s, background 0.12s;
    }
    .btn-urn:hover:not(:disabled) { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; }
    .btn-urn:disabled { opacity: 0.45; cursor: not-allowed; }

    .decision-error { color: #dc2626; font-size: 0.85rem; margin-top: 12px; text-align: center; min-height: 20px; }

    /* Thank-you screen */
    .thanks-wrap { text-align: center; padding: 20px 0 10px; }
    .thanks-icon { font-size: 3.2rem; margin-bottom: 12px; }
    .thanks-title { font-size: 1.35rem; font-weight: 700; color: #111827; margin-bottom: 8px; }
    .thanks-sub { font-size: 0.9rem; color: #6b7280; }

    /* Screens */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ââ Results panel âââââââââââââââââââââââââââââââââ */
    .results-body {
      max-width: 960px;
      width: 100%;
      padding: 28px 16px 48px;
    }
    .results-header {
      margin-bottom: 28px;
    }
    .results-header h1 { font-size: 1.5rem; font-weight: 700; color: #111827; }
    .results-header .subtitle { font-size: 0.88rem; color: #6b7280; margin-top: 4px; }
    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }
    .results-group-card {
      background: white;
      border-radius: 14px;
      padding: 20px 20px 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    .results-group-card.simultaneous {
      grid-column: 1 / -1;
    }
    .rg-title {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 12px;
    }
    .rg-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }
    .rg-table th {
      text-align: left;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #9ca3af;
      padding: 0 6px 8px 6px;
      border-bottom: 1px solid #f3f4f6;
    }
    .rg-table td {
      padding: 7px 6px;
      border-bottom: 1px solid #f9fafb;
      color: #374151;
      vertical-align: middle;
    }
    .rg-table tr:last-child td { border-bottom: none; }
    .sig-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
    }
    .sig-dot {
      width: 11px; height: 11px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .sig-red  { background: #ef4444; }
    .sig-blue { background: #3b82f6; }
    .choice-a { color: #1d4ed8; font-weight: 700; }  /* Blue Urn */
    .choice-b { color: #dc2626; font-weight: 700; }  /* Red Urn */
    .choice-pending { color: #d1d5db; font-style: italic; }
    .auto-badge {
      font-size: 0.65rem;
      background: #fef3c7;
      color: #92400e;
      border-radius: 4px;
      padding: 1px 5px;
      margin-left: 4px;
      font-weight: 600;
    }
    .live-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      margin-right: 6px;
      animation: pulse 1.6s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
    }
  </style>
</head>

  <!-- âââ SCREEN 0 â Instructor (URL: ?instructor) ââââ -->
  <div id="screen-instructor" class="screen">

    <h1>Information Cascade</h1>
    <p class="subtitle">Click Start when students are ready. Each sequential position will auto-advance if no decision is made within 30 seconds.</p>
    <div id="exp-running-banner" style="display:none;" class="exp-running-msg"></div>
    <button class="btn-primary" id="btn-start" onclick="instructorStart()">Start Experiment â</button>
    <div id="instructor-timeline" style="margin-top:24px; display:none;">
      <div class="section-label">Auto-advance Timeline</div>
      <table class="timeline-table" id="timeline-table"></table>
    </div>
  </div>
